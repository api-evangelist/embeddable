features:
- name: Drop-in UI Components
  description: Embeddable platforms ship pre-built, brandable UI components that drop
    into a host page via a script tag, web component, or framework binding without
    requiring developers to build the experience from scratch.
- name: Iframe and Script-Tag Distribution
  description: Most embeddable widgets are delivered as either a hosted iframe or
    a small JavaScript bootstrap that injects an isolated DOM subtree into the host
    site, insulating it from CSS and JS conflicts.
- name: Tokenized and Scoped Authentication
  description: Embeds use short-lived, server-issued tokens (publishable keys, link
    tokens, JWTs, session tokens) so the host site can render the widget without exposing
    long-lived provider credentials in the browser.
- name: Theme and Style Customization
  description: Embeds expose theming hooks - color tokens, fonts, CSS variables, layout
    options - so the embedded experience matches the host product's visual identity.
- name: Postmessage and Callback Event Model
  description: Embedded widgets communicate with the host page through postMessage
    events, callback functions, or SDK event listeners covering lifecycle states like
    ready, success, error, and dismiss.
- name: Embedded Analytics and Dashboards
  description: BI vendors like Looker, Sigma, Cube, Mode, Apache Superset, Metabase,
    Power BI, and Tableau ship embed SDKs and signed iframe URLs so customers can
    drop full dashboards into their own SaaS products.
- name: PCI, KYC, and Compliance Offloading
  description: Embeds for payments, identity, and financial data (Stripe Elements,
    Plaid Link, Auth0 Lock) keep sensitive data inside the provider's frame so the
    host product stays out of PCI, KYC, and compliance scope.
- name: Mobile SDK and Web Parity
  description: Most embeddable platforms ship matching iOS, Android, and React Native
    SDKs alongside the JS widget so the same experience can be embedded across web
    and mobile apps.
use_cases:
- name: Accepting Payments Without PCI Scope
  description: Drop Stripe Elements, Stripe Checkout, Braintree Drop-in, Adyen Components,
    or Square Web Payments SDK into a checkout flow to capture cards without the host
    server ever touching raw PAN data.
- name: Linking Bank Accounts and Financial Data
  description: Embed Plaid Link in a fintech onboarding flow so users can authenticate
    with their bank, link accounts, and grant data access without leaving the host
    application.
- name: Embedding Maps and Location Pickers
  description: Drop Mapbox GL JS or the Google Maps Embed into a marketplace, real
    estate, or logistics product to render interactive maps, search by address, and
    place markers without building map tiles in-house.
- name: Adding Live Chat and Support Widgets
  description: Embed Intercom Messenger, Drift, Crisp, Olark, LiveChat, Help Scout
    Beacon, Zendesk Web Widget, or Freshdesk Messaging to add support and sales chat
    to any site through a single script tag.
- name: Inline Scheduling and Booking
  description: Embed Calendly or Cal.com inline widgets into marketing sites and SaaS
    dashboards so prospects and customers can book meetings without bouncing to a
    third-party scheduler.
- name: Embedded Forms and Lead Capture
  description: Drop HubSpot Forms, Typeform, JotForm, Gravity Forms, or Formspree
    into landing pages and product surfaces to capture leads, feedback, and onboarding
    data without backend work.
- name: Embedded BI Dashboards in SaaS
  description: SaaS vendors embed Looker, Sigma, Cube, Mode, Apache Superset, Metabase,
    Knowi, Qlik Mashups, Power BI, SAP BI Tools, or Tableau to give customers in-app
    dashboards branded as part of the host product.
- name: Login, Signup, and Identity as a Widget
  description: Embed Auth0 Lock or hosted login pages to give the host product a full
    identity experience - email/password, social, MFA, passwordless - without building
    auth screens.
integrations:
- name: Stripe Elements and Checkout
  description: Pre-built, PCI-scope-reducing UI components and a hosted checkout page
    that drop into any web or mobile app to accept cards, wallets, ACH, and BNPL.
- name: Plaid Link
  description: Drop-in flow that lets end users authenticate with their bank, link
    accounts, and grant data access in a few clicks, returning a public token to the
    host app.
- name: Mapbox GL JS
  description: WebGL-based JS SDK for embedding interactive vector maps, custom styles,
    3D terrain, and geocoding into web applications.
- name: Google Maps Embed
  description: Iframe-based embed and JavaScript SDK for placing Google Maps, Street
    View, directions, and search into any host page.
- name: Intercom Messenger
  description: Embeddable customer messaging widget delivered via a single script
    tag, with conversation routing, product tours, and inbox tooling on the operator
    side.
- name: Calendly Inline Widget
  description: Embeddable scheduling experience that drops into a host page as an
    inline widget, popup, or popup text link to capture bookings.
- name: Typeform Embed
  description: Iframe and JS embed for Typeform conversational forms in inline, popup,
    drawer, side-tab, popover, and full-page modes.
- name: Auth0 Lock and Universal Login
  description: Embeddable login widget and hosted login pages that handle email/password,
    social, MFA, and passwordless flows for the host product.
- name: Looker and Sigma Embedded Analytics
  description: Embedded analytics SDKs and signed iframe URLs for dropping BI dashboards,
    explores, and visualizations directly into customer-facing SaaS products.
- name: Apache Superset and Cube Embedded
  description: Open-source and headless embedded analytics platforms providing JWT-signed
    dashboards, charts, and semantic-layer-driven embeds.
